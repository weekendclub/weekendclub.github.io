<link rel="stylesheet" href="style.css">

<body>

<header id="site-header"></header>
<nav class="mobile-menu" id="mobileMenu"></nav>

<section class="subhero">
  <div class="wrap subhero-inner">
    <div class="breadcrumb"><a href="index.html">ホーム</a> ／ フォトギャラリー</div>

  </div>
</section>

<section class="block">
  <div class="wrap">
    <div class="gallery-grid reveal" id="gallery"></div>
    <p class="cnote reveal" style="margin-top:20px">※ 写真を追加するには、下の photos に { src:"画像のURL", cap:"説明" } を足してください。現在の写真は今のサイト（Jimdo）から表示しています。将来Jimdoを閉じる場合は、画像を新しい場所にアップして src を差し替えてください。</p>
  </div>
</section>

      <a class="btn btn-primary" href="links.html">SNS・リンク集へ</a>

<footer id="site-footer"></footer>
<button class="to-top" id="toTop" aria-label="上に戻る">↑</button>

<!-- 集合写真を1枚目に使うため読み込み -->
<script src="team-photo.js"></script>
<script src="site.js"></script>
<script>
/* =====================================================================
   ★★★ このページの内容はここを編集します ★★★
   ・写真を追加 → photos に { src:"画像のURL", cap:"説明" } を足す
   ・src を "" にすると「追加用の見本マス」になります
   ===================================================================== */
var IMG = "https://image.jimcdn.com/app/cms/image/transf/dimension=640x480:mode=crop:format=jpg/path/sa4c70deaa5976d3d/image/";
const PAGE = {
  photos: [
    {src: HERO_IMG, cap:"BOSCO NEXT 集合写真"},
    {src: IMG+"i40f8081a10853751/version/1760499494/image.jpg", cap:"2025 東京都大会 優勝🏆"},
    {src: IMG+"ide35bf613a4fda0a/version/1758130414/image.jpg", cap:"2025 東京都大会"},
    {src: IMG+"i149f4370d0156da4/version/1758332591/image.jpg", cap:"BOSCO NEXT"},
    {src: IMG+"i86de3bbb5cb7813f/version/1758332591/image.jpg", cap:"BOSCO NEXT"},
    {src: IMG+"ic73cc5c566366a3d/version/1737084319/image.jpg", cap:"2024 エスパルスハートフルカップ"},
    {src: IMG+"i279c7c5d95993180/version/1521024346/image.jpg", cap:"ヨコハマぽるとカップ2014"},
    {src: IMG+"i83c013dc8de88a59/version/1431687782/image.jpg", cap:"ホームグラウンド 下丸子公園"},
    {src: IMG+"ic2fdceab0925d4f9/version/1431688868/image.jpg", cap:"交流試合＋キッズクリニック＆BBQ"},
    {src: IMG+"i0bbda1acd3660129/version/1431687434/image.jpg", cap:"初の大阪遠征"}
  ]
};

/* ===== 表示の仕組み（内容は gallery.json＝CMSで編集。読めない時は上の PAGE を表示）===== */
function renderGallery(d){
  var photos = (d && d.photos) ? d.photos : PAGE.photos;
  document.getElementById("gallery").innerHTML = photos.map(function(p){
    var inner = p.src
      ? '<img src="'+esc(p.src)+'" alt="'+esc(p.cap||"")+'" loading="lazy"><span class="cap">'+esc(p.cap||"")+'</span>'
      : '<span class="gallery-empty">＋ 画像を追加</span>';
    return '<div class="gallery-item">'+inner+'</div>';
  }).join("");
  observeReveals();
}
loadJSON("gallery.json", function(d){ renderGallery(d); });
</script>
</body>
</html>
