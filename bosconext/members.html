<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会員専用ページ｜BOSCO NEXT</title>
<meta name="description" content="BOSCO NEXT（ボスコ ネクスト）メンバー専用ページのご案内。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Dela+Gothic+One&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<body>

<header id="site-header"></header>
<nav class="mobile-menu" id="mobileMenu"></nav>

<section class="subhero">
  <div class="wrap subhero-inner">
    <div class="breadcrumb"><a href="index.html">ホーム</a> ／ 会員専用ページ</div>
    <span class="kicker">Members</span>
    <h1>会員専用ページ</h1>
    <p>チームメンバー向けの情報を掲載しています。</p>
  </div>
</section>

<section class="block">
  <div class="wrap">
    <div class="locked-card reveal">
      <div class="lock">🔒</div>
      <h3>このページはメンバー専用です</h3>
      <p>ご覧いただくにはログインが必要です。<br>主に次のような情報を掲載しています。</p>
      <div class="locked-list">
        <div>練習日程・会場などの詳細な連絡</div>
        <div>大会・遠征・合宿の案内</div>
        <div>チーム内の共有資料・連絡事項</div>
      </div>
      <div class="hero-cta" style="justify-content:center">
        <a class="btn btn-primary" data-link="jimdoMembers" target="_blank" rel="noopener">🔑 会員ページへログイン</a>
        <a class="btn btn-outline" data-link="contact">メンバーについて問い合わせる</a>
      </div>
      <p class="cnote" style="margin-top:18px">※ ログイン情報がわからない場合は、お問い合わせよりご連絡ください。</p>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>
<button class="to-top" id="toTop" aria-label="上に戻る">↑</button>

<script src="site.js"></script>
