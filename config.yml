# ============================================================
#  BOSCO NEXT CMS 設定
#
#  ▼ あとで直すのは backend の中の2か所だけ：
#     ・repo          … あなたの「GitHubユーザー名/リポジトリ名」
#     ・identity_url   … DecapBridgeが表示する値
#    （どちらもDecapBridgeに登録すると画面に出ます。コピペでOK）
# ============================================================
backend:
  name: git-gateway
  repo: bosconext/bosconext-site           
  branch: main                                              # ← 基本ブランチ（通常 main）
  identity_url: https://auth.decapbridge.com/sites/d705ef0d-2d21-481d-be33-47ebbf3ea0e0
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'

# 画面の言語
locale: ja

# （任意）公開URLが決まったら、コメントを外して設定すると編集画面に「サイトを見る」が出ます
site_url: https://bosconext-futsal.netlify.app
display_url: https://bosconext-futsal.netlify.app

# 画像をアップロードしたときの保存先
media_folder: images/uploads
public_folder: /images/uploads

collections:
  - name: news
    label: お知らせ
    files:
      - name: news_list
        label: お知らせ一覧
        file: news.json
        description: トップページに表示されるお知らせです。上にあるものほど新しく表示されます。
        fields:
          - label: お知らせ
            name: items
            label_singular: お知らせ
            widget: list
            summary: '{{fields.date}}｜{{fields.title}}'
            fields:
              - { label: 日付, name: date, widget: string, hint: '例：2026.7.20' }
              - label: カテゴリ
                name: tag
                widget: select
                default: info
                options:
                  - { label: 大会結果, value: result }
                  - { label: 活動報告, value: report }
                  - { label: お知らせ, value: info }
              - { label: 見出し, name: title, widget: string }
              - { label: 本文, name: body, widget: text }
              - { label: 'リンク（任意）', name: link, widget: string, required: false, default: '' }
              - { label: 'リンクの文字（任意）', name: linkText, widget: string, required: false, default: '' }
